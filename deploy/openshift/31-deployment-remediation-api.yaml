apiVersion: apps/v1
kind: Deployment
metadata:
  name: remediation-api
  namespace: remediation-app
  labels:
    app.kubernetes.io/name: remediation-api
    app.kubernetes.io/part-of: remediation-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: remediation-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: remediation-api
        app.kubernetes.io/part-of: remediation-stack
    spec:
      serviceAccountName: remediation-api
      containers:
        - name: api
          # OpenShift internal registry (same namespace). Build with: oc start-build remediation-api --from-dir=. --follow
          image: image-registry.openshift-image-registry.svc:5000/remediation-app/remediation-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8787
              name: http
          env:
            - name: REMEDIATION_PROJECT_ROOT
              value: "/app"
            # Use FastMCP streamable HTTP to server-gpt (Deployment mcp-server). Uncomment after 32/33 manifests applied:
            # - name: REMEDIATION_MCP_URL
            #   value: "http://mcp-server.remediation-app.svc.cluster.local:9000/mcp"
            # Optional LLM — create Secret remediation-llm-credentials (see README + examples/llm-credentials-secret.yaml)
            # - name: GRANITE_API_BASE
            #   valueFrom:
            #     secretKeyRef:
            #       name: remediation-llm-credentials
            #       key: GRANITE_API_BASE
            # - name: GRANITE_API_TOKEN
            #   valueFrom:
            #     secretKeyRef:
            #       name: remediation-llm-credentials
            #       key: GRANITE_API_TOKEN
            # Dual-Route UI: comma-separated origins
            # - name: REMEDIATION_CORS_ORIGINS
            #   value: "https://agent-console-remediation-app.apps.example.com"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/remediation/health
              port: 8787
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/remediation/health
              port: 8787
            initialDelaySeconds: 15
            periodSeconds: 20
