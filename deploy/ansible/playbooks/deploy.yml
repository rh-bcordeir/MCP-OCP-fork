---
# Deploy everything under deploy/openshift to OpenShift / Kubernetes.
#
# Prerequisites: Ansible + oc (or kubectl), logged-in context. Applies manifests via the CLI — no Python kubernetes package required.
#
#   cd deploy/ansible && ansible-playbook playbooks/deploy.yml
#
# Options:
#   ansible-playbook playbooks/deploy.yml -e remediation_namespace=my-proj \
#     -e remediation_api_image=quay.io/org/remediation-api:v1 \
#     -e agent_console_image=quay.io/org/agent-console:v1
#
# First-time images (internal registry, no Quay): apply + binary builds + rollout
#   ansible-playbook playbooks/deploy.yml -e remediation_ocp_build=true
# Or build with podman (--tags build), push if needed, then deploy.
#
# LLM Secret already in namespace: wire env only
#   ansible-playbook playbooks/deploy.yml -e remediation_llm_from_existing_secret=true
#
# hosts: localhost = machine where Ansible runs (your laptop or a bastion).
# OpenShift is the *API target* via oc/kubectl + KUBECONFIG — workloads are not executed on localhost.
#
- name: Deploy remediation stack to OpenShift
  hosts: localhost
  gather_facts: false

  vars:
    # Defaults here so the playbook works even if group_vars/ is not loaded (e.g. run from another cwd without deploy/ansible/ansible.cfg).
    remediation_namespace: remediation-app
    # Default: OpenShift internal registry (see deploy/openshift BuildConfigs — no Docker Hub / Quay required)
    remediation_api_image: image-registry.openshift-image-registry.svc:5000/remediation-app/remediation-api:latest
    agent_console_image: image-registry.openshift-image-registry.svc:5000/remediation-app/agent-console:latest
    remediation_set_images: true
    # Set true once (or use oc start-build manually) to populate ImageStreams before pods can pull
    remediation_ocp_build: false
    # After on-cluster build, same image tag (:latest) needs a new rollout; also clears "progress deadline exceeded"
    # from a previous failed rollout. Set true manually if rollout status fails immediately: -e remediation_rollout_restart=true
    remediation_rollout_restart: false

    # Optional LLM Secret (never commit real values — use -e, vault, or CI secrets)
    remediation_llm_secret_name: remediation-llm-credentials
    remediation_llm_granite_base: ""
    remediation_llm_granite_token: ""
    remediation_llm_openai_base: ""
    remediation_llm_openai_key: ""
    remediation_llm_model: ""
    remediation_llm_wire_deployment: true
    # If Secret already exists in the namespace (e.g. oc create secret …), only wire env into the Deployment
    remediation_llm_from_existing_secret: false

    openshift_manifest_dir: "{{ playbook_dir }}/../../openshift"
    # ansible_env is unset when gather_facts: false; use env lookup (fallback /tmp for CI)
    manifest_staging_dir: "{{ (lookup('env', 'HOME') | trim) or '/tmp' }}/.cache/ansible-basic-mcp-ocp"
    basic_mcp_root: "{{ playbook_dir }}/../../.."
    openshift_manifest_files:
      - 00-namespace.yaml
      - 10-serviceaccount.yaml
      - 20-clusterrole.yaml
      - 21-clusterrolebinding.yaml
      - 25-imagestream-remediation-api.yaml
      - 26-imagestream-agent-console.yaml
      - 27-buildconfig-remediation-api.yaml
      - 28-buildconfig-agent-console.yaml
      - 30-service-remediation-api.yaml
      - 31-deployment-remediation-api.yaml
      - 40-service-agent-console.yaml
      - 41-deployment-agent-console.yaml
      - 50-route-agent-console.yaml

  pre_tasks:
    - name: Require oc or kubectl
      ansible.builtin.command: bash -lc "command -v oc &>/dev/null && echo oc || command -v kubectl"
      register: remediation_k8s_cli
      changed_when: false

    - name: Fail if no OpenShift/Kubernetes CLI
      ansible.builtin.fail:
        msg: "Install oc (OpenShift) or kubectl and ensure you are logged in (oc login / KUBECONFIG)."
      when: remediation_k8s_cli.stdout | default('') | length == 0

    - name: Set cluster CLI fact
      ansible.builtin.set_fact:
        remediation_oc: "{{ remediation_k8s_cli.stdout | trim }}"

  tasks:
    - name: Ensure staging directory for rendered manifests
      ansible.builtin.file:
        path: "{{ manifest_staging_dir }}"
        state: directory
        mode: "0755"

    - name: Stage OpenShift manifests (from deploy/openshift)
      ansible.builtin.copy:
        src: "{{ openshift_manifest_dir }}/{{ item }}"
        dest: "{{ manifest_staging_dir }}/{{ item }}"
        mode: "0644"
      loop: "{{ openshift_manifest_files }}"
      loop_control:
        label: "{{ item }}"

    - name: Replace default project name in staged files
      ansible.builtin.replace:
        path: "{{ manifest_staging_dir }}/{{ item }}"
        regexp: remediation-app
        replace: "{{ remediation_namespace }}"
      loop: "{{ openshift_manifest_files }}"
      loop_control:
        label: "{{ item }}"

    - name: Apply manifests (oc/kubectl apply — no Python kubernetes package required)
      ansible.builtin.shell:
        cmd: |
          set -e
          {% for f in openshift_manifest_files %}
          {{ remediation_oc }} apply -f "{{ manifest_staging_dir }}/{{ f }}"
          {% endfor %}
        executable: /bin/bash
      register: remediation_apply_all
      changed_when: >-
        'created' in remediation_apply_all.stdout
        or 'configured' in remediation_apply_all.stdout

    # --- Optional: LLM credentials Secret + wire into remediation-api (same namespace) ---
    - name: Create or update LLM Secret (GRANITE_API_*)
      vars:
        _b: "{{ remediation_llm_granite_base | default('', true) | trim }}"
        _t: "{{ remediation_llm_granite_token | default('', true) | trim }}"
      when:
        - _b | length > 0
        - _t | length > 0
      no_log: true
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          export GRANITE_API_BASE='{{ _b | regex_replace("'", "'\\''") }}'
          export GRANITE_API_TOKEN='{{ _t | regex_replace("'", "'\\''") }}'
          {{ remediation_oc }} create secret generic "{{ remediation_llm_secret_name }}" \
            --from-literal=GRANITE_API_BASE="$GRANITE_API_BASE" \
            --from-literal=GRANITE_API_TOKEN="$GRANITE_API_TOKEN" \
            -n "{{ remediation_namespace }}" \
            --dry-run=client -o yaml | {{ remediation_oc }} apply -f -
        executable: /bin/bash
      register: remediation_llm_secret_granite
      changed_when: "'configured' in remediation_llm_secret_granite.stdout or 'created' in remediation_llm_secret_granite.stdout"

    - name: Create or update LLM Secret (OPENAI_* — if Granite vars not set)
      vars:
        _b: "{{ remediation_llm_openai_base | default('', true) | trim }}"
        _k: "{{ remediation_llm_openai_key | default('', true) | trim }}"
        _gb: "{{ remediation_llm_granite_base | default('', true) | trim }}"
        _gt: "{{ remediation_llm_granite_token | default('', true) | trim }}"
      when:
        - _b | length > 0
        - _k | length > 0
        - (_gb | length == 0) or (_gt | length == 0)
      no_log: true
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          export OPENAI_BASE_URL='{{ _b | regex_replace("'", "'\\''") }}'
          export OPENAI_API_KEY='{{ _k | regex_replace("'", "'\\''") }}'
          {{ remediation_oc }} create secret generic "{{ remediation_llm_secret_name }}" \
            --from-literal=OPENAI_BASE_URL="$OPENAI_BASE_URL" \
            --from-literal=OPENAI_API_KEY="$OPENAI_API_KEY" \
            -n "{{ remediation_namespace }}" \
            --dry-run=client -o yaml | {{ remediation_oc }} apply -f -
        executable: /bin/bash
      register: remediation_llm_secret_openai
      changed_when: "'configured' in remediation_llm_secret_openai.stdout or 'created' in remediation_llm_secret_openai.stdout"

    - name: Verify LLM Secret exists (when using existing secret)
      when: remediation_llm_from_existing_secret | bool
      ansible.builtin.command:
        cmd: "{{ remediation_oc }} get secret {{ remediation_llm_secret_name }} -n {{ remediation_namespace }} -o name"
      register: remediation_llm_secret_check
      changed_when: false
      failed_when: false

    - name: List available Secrets (if LLM Secret not found)
      when:
        - remediation_llm_from_existing_secret | bool
        - remediation_llm_secret_check.rc != 0
      ansible.builtin.command:
        cmd: "{{ remediation_oc }} get secrets -n {{ remediation_namespace }} -o custom-columns=NAME:.metadata.name --no-headers | grep -i llm || echo '(no secrets matching llm)'"
      register: remediation_llm_secrets_list
      changed_when: false
      failed_when: false

    - name: Fail if LLM Secret not found
      when:
        - remediation_llm_from_existing_secret | bool
        - remediation_llm_secret_check.rc != 0
      ansible.builtin.fail:
        msg: |
          Secret "{{ remediation_llm_secret_name }}" not found in namespace "{{ remediation_namespace }}".

          Available secrets (matching 'llm'):
          {{ remediation_llm_secrets_list.stdout | default('(none found)') }}

          Create the Secret first:
            oc create secret generic {{ remediation_llm_secret_name }} \
              --from-literal=GRANITE_API_BASE='https://...' \
              --from-literal=GRANITE_API_TOKEN='...' \
              -n {{ remediation_namespace }}

          Or pass credentials to Ansible to create it:
            ansible-playbook playbooks/deploy.yml \
              -e remediation_llm_granite_base='...' \
              -e remediation_llm_granite_token='...'

          Or adjust the secret name: -e remediation_llm_secret_name=your-secret-name

    - name: Import LLM env from Secret into remediation-api Deployment
      when:
        - remediation_llm_wire_deployment | bool
        - (not ((remediation_llm_secret_granite.skipped | default(false)) and (remediation_llm_secret_openai.skipped | default(false)))) or (remediation_llm_from_existing_secret | bool)
      ansible.builtin.command:
        cmd: >-
          {{ remediation_oc }} set env deployment/remediation-api
          --from=secret/{{ remediation_llm_secret_name }}
          -n {{ remediation_namespace }}
      register: remediation_llm_set_env
      changed_when: remediation_llm_set_env.rc == 0
      failed_when: false

    - name: Fail if oc set env failed
      when:
        - remediation_llm_set_env is defined
        - not (remediation_llm_set_env.skipped | default(false))
        - remediation_llm_set_env.rc | default(0) != 0
      ansible.builtin.fail:
        msg: |
          Failed to wire Secret "{{ remediation_llm_secret_name }}" into deployment/remediation-api.

          Error: {{ remediation_llm_set_env.stderr | default(remediation_llm_set_env.msg) }}

          Verify:
            - Secret exists: {{ remediation_oc }} get secret {{ remediation_llm_secret_name }} -n {{ remediation_namespace }}
            - Deployment exists: {{ remediation_oc }} get deployment remediation-api -n {{ remediation_namespace }}
            - Secret has expected keys (GRANITE_API_BASE, GRANITE_API_TOKEN, or OPENAI_*): {{ remediation_oc }} describe secret {{ remediation_llm_secret_name }} -n {{ remediation_namespace }}

    - name: Set LLM_MODEL on remediation-api (optional)
      when: remediation_llm_model | default('', true) | trim | length > 0
      ansible.builtin.command:
        cmd: >-
          {{ remediation_oc }} set env deployment/remediation-api
          LLM_MODEL={{ remediation_llm_model | trim }}
          -n {{ remediation_namespace }}
      register: remediation_llm_model_env
      changed_when: remediation_llm_model_env.rc == 0

    # Populate ImageStreams before rollout (internal registry — no Docker Hub)
    - name: Build remediation-api ImageStream (oc start-build --from-dir)
      ansible.builtin.command:
        cmd: >-
          {{ remediation_oc }} start-build remediation-api
          --from-dir "{{ basic_mcp_root }}"
          --follow
          -n {{ remediation_namespace }}
      when: remediation_ocp_build | bool
      register: ocp_build_api
      changed_when: ocp_build_api.rc == 0

    - name: Build agent-console ImageStream (oc start-build --from-dir)
      ansible.builtin.command:
        cmd: >-
          {{ remediation_oc }} start-build agent-console
          --from-dir "{{ basic_mcp_root }}"
          --follow
          -n {{ remediation_namespace }}
      when: remediation_ocp_build | bool
      register: ocp_build_ui
      changed_when: ocp_build_ui.rc == 0

    - name: Set remediation-api container image
      ansible.builtin.command:
        cmd: >-
          {{ remediation_oc }} set image deployment/remediation-api
          api={{ remediation_api_image }}
          -n {{ remediation_namespace }}
      when: remediation_set_images | bool
      register: set_img_api
      changed_when: "'image updated' in set_img_api.stdout | lower or 'deployment.apps' in set_img_api.stdout"

    - name: Set agent-console container image
      ansible.builtin.command:
        cmd: >-
          {{ remediation_oc }} set image deployment/agent-console
          nginx={{ agent_console_image }}
          -n {{ remediation_namespace }}
      when: remediation_set_images | bool
      register: set_img_ui
      changed_when: "'image updated' in set_img_ui.stdout | lower or 'deployment.apps' in set_img_ui.stdout"

    # New image at same tag does not change the Deployment spec; restart forces pull + clears stuck Progressing=False.
    - name: Rollout restart remediation-api (after build or when forced)
      ansible.builtin.command:
        cmd: "{{ remediation_oc }} rollout restart deployment/remediation-api -n {{ remediation_namespace }}"
      when:
        - remediation_set_images | bool
        - (remediation_ocp_build | bool) or (remediation_rollout_restart | bool)
      changed_when: true

    - name: Rollout restart agent-console (after build or when forced)
      ansible.builtin.command:
        cmd: "{{ remediation_oc }} rollout restart deployment/agent-console -n {{ remediation_namespace }}"
      when:
        - remediation_set_images | bool
        - (remediation_ocp_build | bool) or (remediation_rollout_restart | bool)
      changed_when: true

    - name: Wait for rollouts to complete
      when: remediation_set_images | bool
      block:
        - name: Wait for remediation-api rollout
          ansible.builtin.command:
            cmd: "{{ remediation_oc }} rollout status deployment/remediation-api -n {{ remediation_namespace }} --timeout=600s"
          changed_when: false

        - name: Wait for agent-console rollout
          ansible.builtin.command:
            cmd: "{{ remediation_oc }} rollout status deployment/agent-console -n {{ remediation_namespace }} --timeout=600s"
          changed_when: false

      rescue:
        - name: Show pod status (rollout diagnosis)
          ansible.builtin.command:
            cmd: "{{ remediation_oc }} get pods -n {{ remediation_namespace }} -o wide"
          changed_when: false
          failed_when: false

        - name: Explain rollout failure
          ansible.builtin.fail:
            msg: |
              Rollout did not finish in time (or Deployment was already failing).

              If stderr was "exceeded its progress deadline", Kubernetes had already marked the last
              rollout failed — `oc rollout status` then returns in about one second (it does not wait the full timeout).

              Fix and re-run this playbook:
                {{ remediation_oc }} rollout restart deployment/remediation-api deployment/agent-console -n {{ remediation_namespace }}
              Or one-time: ansible-playbook ... -e remediation_rollout_restart=true

              Check logs:
                {{ remediation_oc }} logs deployment/remediation-api -n {{ remediation_namespace }} --tail=80
                {{ remediation_oc }} describe pod -l app.kubernetes.io/name=remediation-api -n {{ remediation_namespace }}

    - name: Get Route host (OpenShift only)
      ansible.builtin.command:
        cmd: "{{ remediation_oc }} get route agent-console -n {{ remediation_namespace }} -o jsonpath='{.spec.host}'"
      register: remediation_route_host
      changed_when: false
      failed_when: false

    - name: Show console URL
      ansible.builtin.debug:
        msg: "Open https://{{ remediation_route_host.stdout | trim }} (Route agent-console in {{ remediation_namespace }})"
      when: remediation_route_host.rc == 0 and remediation_route_host.stdout | trim | length > 0

    # --- Optional: build images with podman (ansible-playbook ... --tags build) ---
    - name: Build remediation-api with podman
      ansible.builtin.command:
        cmd: >-
          podman build -f deploy/openshift/Dockerfile.remediation-api
          -t {{ remediation_api_image }}
          .
        chdir: "{{ basic_mcp_root }}"
      tags: [build]
      register: podman_build_api
      changed_when: true

    - name: Build agent-console with podman
      ansible.builtin.command:
        cmd: >-
          podman build -f deploy/openshift/Dockerfile.agent-console
          -t {{ agent_console_image }}
          .
        chdir: "{{ basic_mcp_root }}"
      tags: [build]
      register: podman_build_ui
      changed_when: true
