---
# Target OpenShift project (replaces literal remediation-app in staged manifests)
remediation_namespace: remediation-app

# Default pull specs: OpenShift internal registry in the same namespace (after ansible substitution)
remediation_api_image: image-registry.openshift-image-registry.svc:5000/remediation-app/remediation-api:latest
agent_console_image: image-registry.openshift-image-registry.svc:5000/remediation-app/agent-console:latest

# Patch deployment images after apply
remediation_set_images: true

# First deploy: set true to run oc start-build (internal registry), or run builds manually (see deploy/openshift/README.md)
remediation_ocp_build: false

# If rollout status fails with "progress deadline exceeded", set true once (or oc rollout restart …)
remediation_rollout_restart: false

# Optional LLM Secret (leave empty; pass via -e @vault.yml or CI — never commit tokens)
# remediation_llm_secret_name: remediation-llm-credentials
# remediation_llm_granite_base: ""
# remediation_llm_granite_token: ""
# remediation_llm_openai_base: ""
# remediation_llm_openai_key: ""
# remediation_llm_model: ""
# remediation_llm_wire_deployment: true
# Secret already in the project? Only run oc set env from it:
# remediation_llm_from_existing_secret: true
